name: Validate dataset metadata

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/validation/validate_release.py
      - run: python -m unittest discover -s tools/validation/tests
