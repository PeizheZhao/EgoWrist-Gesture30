<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ffffff">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Dataset",
        "name": "EgoWrist-Gesture30",
        "description": {{ site.description | jsonify }},
        "version": "1.0.0",
        "keywords": ["dynamic gesture recognition", "wrist-worn camera", "dual-view RGB", "IMU", "multimodal dataset"],
        "creator": [
          {% for author in site.data.authors %}{"@type": "Person", "name": {{ author.name | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}
        ],
        "license": "https://opensource.org/licenses/MIT"
      }
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header" data-header>
      <div class="nav-shell">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="EgoWrist-Gesture30 home">
          <span>EgoWrist-Gesture30</span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
          <span></span><span></span><span></span><span class="sr-only">Toggle navigation</span>
        </button>
        <nav class="site-nav" id="site-nav" aria-label="Primary navigation" data-nav>
          <a href="#overview">Overview</a>
          <a href="#dataset">Dataset</a>
          <a href="#device">Device</a>
          <a href="#publication">Paper</a>
          <a href="#access">Access</a>
        </nav>
      </div>
    </header>
    <main id="main-content">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div>
        <strong>EgoWrist-Gesture30</strong>
        <p>Dual-view wrist-worn dynamic gesture research.</p>
      </div>
      <div class="footer-links">
        <a href="#overview">Overview</a>
        <a href="#citation">Citation</a>
        {% if site.github.repository_url %}<a href="{{ site.github.repository_url }}">GitHub</a>{% endif %}
      </div>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
