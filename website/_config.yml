title: EgoWrist-Gesture30
tagline: Dual-view wrist-worn RGB and IMU dataset for dynamic gesture recognition
description: >-
  EgoWrist-Gesture30 is a multimodal dynamic hand-gesture dataset with approximately
  synchronized dorsal and palm wrist-camera views, WT61C-TTL IMU measurements,
  30 gesture classes, 13 participants, and 336 recordings.
lang: en
timezone: Asia/Shanghai
url: "https://peizhezhao.github.io"
baseurl: "/EgoWrist-Gesture30"
repository: PeizheZhao/EgoWrist-Gesture30

markdown: kramdown
highlighter: rouge
permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: default
